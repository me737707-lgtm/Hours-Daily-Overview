<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hours Overview Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="dashboard">

        <header class="header">
            <div class="header-left">
                <div class="header-logo">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline>
                    </svg>
                </div>
                <div class="header-text">
                    <h1 class="header-title">Hours Overview</h1>
                    <p class="header-subtitle">Real-time tracking dashboard</p>
                </div>
            </div>
            <div class="header-right">
                <div class="live-indicator">
                    <span class="live-dot"></span>
                    <span class="live-text">Live</span>
                </div>
                <button id="theme-toggle" class="theme-toggle" aria-label="Toggle theme">
                    <svg class="icon-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="5"></circle>
                        <line x1="12" y1="1" x2="12" y2="3"></line>
                        <line x1="12" y1="21" x2="12" y2="23"></line>
                        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                        <line x1="1" y1="12" x2="3" y2="12"></line>
                        <line x1="21" y1="12" x2="23" y2="12"></line>
                        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                    </svg>
                    <svg class="icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                    </svg>
                </button>
            </div>
        </header>

        <nav id="tabs-nav" class="tabs-nav" role="tablist">
            <div class="tabs-skeleton" id="tabs-skeleton">
                <span class="skeleton-pill" style="width:120px"></span>
                <span class="skeleton-pill" style="width:100px"></span>
                <span class="skeleton-pill" style="width:110px"></span>
                <span class="skeleton-pill" style="width:95px"></span>
                <span class="skeleton-pill" style="width:105px"></span>
            </div>
        </nav>

        <section id="stats-bar" class="stats-bar" style="display:none"></section>

        <div id="view-controls" class="view-controls" style="display:none">
            <div class="segmented-control">
                <button class="seg-btn active" data-view="daily">Daily View</button>
                <button class="seg-btn" data-view="weekly">Weekly View</button>
            </div>
        </div>

        <main class="main-content">

            <div id="loading" class="loading-state">
                <div class="loading-spinner">
                    <div class="spinner-ring"></div>
                    <div class="spinner-ring spinner-ring-inner"></div>
                </div>
                <div class="loading-text">
                    <p class="loading-title">Loading Dashboard</p>
                    <p class="loading-subtitle">Fetching real-time data from source...</p>
                </div>
                <div class="loading-bars">
                    <span class="skeleton-bar"></span>
                    <span class="skeleton-bar" style="width:80%"></span>
                    <span class="skeleton-bar" style="width:60%"></span>
                </div>
            </div>

            <div id="error-state" class="error-state" style="display:none">
                <div class="error-icon">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon>
                    </svg>
                </div>
                <p class="error-title">Unable to Load Data</p>
                <p class="error-message" id="error-message"></p>
                <button id="retry-btn" class="retry-btn">Retry</button>
            </div>

            <div id="cards-grid" class="cards-grid" style="display:none"></div>

        </main>
    </div>

    <script src="script.js?v=8"></script>
</body>
</html>
